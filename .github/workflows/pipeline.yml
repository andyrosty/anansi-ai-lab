name: CI Pipeline

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.20.6 ansible-lint==26.4.0
          ansible-galaxy collection install -r collections/requirements.yml

      - name: Validate inventory and playbook syntax
        run: |
          ansible-inventory -i inventory/hosts.yml --list > /dev/null
          make syntax-check

      - name: Run ansible-lint
        run: ansible-lint

  scan:
    name: Security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  build:
    name: Build release bundle
    runs-on: ubuntu-latest
    needs:
      - test
      - scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package repository
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          fi
          if [ -z "${VERSION}" ]; then
            VERSION="${GITHUB_SHA::7}"
          fi
          VERSION="${VERSION//\//-}"
          ARCHIVE="ansible-ai-lab-${VERSION}.tar.gz"
          tar --exclude-vcs --exclude='./dist' -czf "dist/${ARCHIVE}" .

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: dist/*.tar.gz
          retention-days: 14

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist

      - name: Create release and upload bundle
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
